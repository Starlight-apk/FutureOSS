[tool:pytest]
testpaths = oss/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
markers =
    integration: Integration tests
    slow: Slow running tests
    plugin: Tests requiring plugin infrastructure
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning